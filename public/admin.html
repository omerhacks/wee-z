<!DOCTYPE html>
<html>
<head>
  <title>Wee'z Admin</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: transparent;
      border: none;
      color: white;
      text-align: left;
      border-radius: 8px;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: rgba(255,255,255,0.1);
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    /* CARDS */
    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      max-width: 200px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      margin-right: 5px;
      cursor: pointer;
    }

    .edit {
      background: #3b82f6;
      color: white;
    }

    .delete {
      background: #ef4444;
      color: white;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        display: flex;
        gap: 10px;
      }

      .sidebar button {
        flex: 1;
        text-align: center;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>🍽 Wee'z</h2>
    <button onclick="loadMenu()">📋 Menu</button>
    <button onclick="loadOrders()">📦 Orders</button>
  </div>

  <div class="main">

    <div class="topbar">
      Welcome, Admin 👋
    </div>

    <div id="content"></div>

  </div>

</div>

<script>
async function loadMenu() {
  const res = await fetch('/menu');
  const data = await res.json();

  let html = "<h2>Menu</h2>";

  data.data.forEach(item => {
    html += `
      <div class="card">
        <b>${item.name}</b> - Rs ${item.price}<br>
        <img src="${item.image}">
        <br><br>
        <button class="btn edit">Edit</button>
        <button class="btn delete">Delete</button>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

async function loadOrders() {
  const res = await fetch('/admin/orders', {
    headers: {
      'x-admin-auth': sessionStorage.getItem('adminToken')
    }
  });

  const data = await res.json();

  let html = "<h2>Orders</h2>";

  data.data.forEach(order => {
    html += `
      <div class="card">
        <b>${order.customerName}</b><br>
        Rs ${order.total}<br>
        Status: ${order.status}
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}
</script>

</body>
</html>
