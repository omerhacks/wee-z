<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wee'z Kitchen</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-brand">🍛 Wee'z Kitchen</div>
    <button class="cart-btn" onclick="toggleCart()">🛒 Cart</button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1 class="hero-title">Flavours That Tell Stories</h1>
    <p class="hero-desc">Authentic Pakistani Food</p>
  </div>
</section>

<!-- MENU -->
<section class="menu-section">
  <div class="container">
    <h2 class="section-title">Menu</h2>
    <div id="menuGrid" class="menu-grid"></div>
  </div>
</section>

<!-- CART -->
<div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>

<aside id="cartSidebar" class="cart-sidebar">
  <div class="cart-header">
    <h3>Your Order</h3>
    <button class="close-btn" onclick="toggleCart()">✕</button>
  </div>

  <div id="cartItems" class="cart-items"></div>

  <div class="cart-footer">
    <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
  </div>
</aside>

<!-- ✅ CHECKOUT MODAL (IMPORTANT: NO INLINE STYLE) -->
<div class="modal-overlay" id="checkoutOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Complete Order</h3>
      <button class="close-btn" onclick="closeCheckout()">✕</button>
    </div>

    <div class="modal-body">
      <input type="text" placeholder="Name" />
      <input type="tel" placeholder="Phone" />

      <h4>Order Type</h4>
      <label>
        <input type="radio" name="orderType" value="pickup" checked>
        Pickup
      </label>

      <label id="lblDelivery">
        <input type="radio" name="orderType" value="delivery">
        Delivery
      </label>

      <textarea placeholder="Address"></textarea>

      <button onclick="closeCheckout()">Close</button>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
