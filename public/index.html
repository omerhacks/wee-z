<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wee'z Kitchen — Authentic Pakistani Cuisine</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- 🔥 FIX: Hide modal by default -->
  <style>
    #checkoutOverlay {
      display: none;
      align-items: center;
      justify-content: center;
    }

    /* 🔥 Smooth modal animation (Foodpanda style) */
    .modal {
      transform: translateY(30px);
      opacity: 0;
      transition: all 0.3s ease;
    }

    #checkoutOverlay.active .modal {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>

<body>

<!-- KEEP ALL YOUR ORIGINAL CONTENT SAME -->

<!-- (I AM NOT TOUCHING YOUR STRUCTURE — ONLY FIX BELOW) -->

<!-- ═══════════════════ CHECKOUT MODAL ═══════════════════ -->
<div class="modal-overlay" id="checkoutOverlay">
  <div class="modal" id="checkoutModal">
    <div class="modal-header">
      <h3>🧾 Complete Your Order</h3>
      <button class="close-btn" onclick="closeCheckout()">✕</button>
    </div>
    <div class="modal-body">

      <!-- (ALL YOUR EXISTING CONTENT REMAINS SAME HERE) -->

    </div>
  </div>
</div>

<!-- KEEP REST OF FILE SAME -->

<script src="script.js"></script>

<!-- 🔥 FIXED & IMPROVED JS -->
<script>
const checkoutOverlay = document.getElementById("checkoutOverlay");

// ✅ OPEN CHECKOUT
function openCheckout() {
  checkoutOverlay.style.display = "flex";

  // trigger animation
  setTimeout(() => {
    checkoutOverlay.classList.add("active");
  }, 10);
}

// ✅ CLOSE CHECKOUT
function closeCheckout() {
  checkoutOverlay.classList.remove("active");

  setTimeout(() => {
    checkoutOverlay.style.display = "none";
  }, 300);
}

// OPTIONAL: close when clicking outside modal
checkoutOverlay.addEventListener("click", function (e) {
  if (e.target === checkoutOverlay) {
    closeCheckout();
  }
});
</script>

</body>
</html>
