<script>
function checkDeliveryTime() {
  const now = new Date();
  const currentTime = now.getHours() * 60 + now.getMinutes();
  const cutoffTime = 22 * 60 + 30; // 10:30 PM

  const deliveryOption = document.querySelector('input[value="delivery"]');
  const pickupOption = document.querySelector('input[value="pickup"]');
  const deliveryLabel = document.getElementById("lblDelivery");

  if (currentTime >= cutoffTime) {
    // Disable delivery radio button
    if (deliveryOption) {
      deliveryOption.disabled = true;
      deliveryOption.checked = false;
    }

    // Grey out UI
    if (deliveryLabel) {
      deliveryLabel.style.opacity = "0.5";
      deliveryLabel.style.pointerEvents = "none";
    }

    // Force pickup
    if (pickupOption) {
      pickupOption.checked = true;
    }

    // Update UI (your existing function)
    if (typeof onOrderTypeChange === "function") {
      onOrderTypeChange();
    }
  }
}

// Run on page load
window.addEventListener("load", checkDeliveryTime);

// Also run when checkout opens
const originalOpenCheckout = window.openCheckout;

window.openCheckout = function () {
  if (originalOpenCheckout) {
    originalOpenCheckout();
  }
  checkDeliveryTime();
};
</script>
