<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wee'z Kitchen — Authentic Pakistani Cuisine</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <div class="nav-brand">
      <span class="brand-icon">🍛</span>
      <div>
        <div class="brand-name">Wee'z Kitchen</div>
        <div class="brand-tagline">Model Town Link Road, Lahore</div>
      </div>
    </div>
    <button class="cart-btn" id="cartBtn" onclick="toggleCart()">
      🛒 Cart <span id="cartBadge">0</span>
    </button>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Flavours That Tell Stories</h1>
    <p>Authentic Pakistani cuisine</p>
    <a href="#menu-section">View Menu</a>
  </div>
</section>

<!-- MENU -->
<section id="menu-section">
  <h2>Our Menu</h2>
  <div id="menuGrid">Loading...</div>
</section>

<!-- CART -->
<div id="cartOverlay" onclick="toggleCart()"></div>
<aside id="cartSidebar">
  <h3>Your Order</h3>
  <div id="cartItems">Cart empty</div>
  <button onclick="openCheckout()">Checkout</button>
</aside>

<!-- ✅ CHECKOUT MODAL (FIXED HERE) -->
<div id="checkoutOverlay" style="display: none;">
  <div id="checkoutModal">
    <h3>Complete Your Order</h3>

    <input type="text" id="custName" placeholder="Full Name" />
    <input type="tel" id="custPhone" placeholder="Phone" />

    <h4>Order Type</h4>

    <label>
      <input type="radio" name="orderType" value="pickup" checked />
      Pickup
    </label>

    <label id="lblDelivery">
      <input type="radio" name="orderType" value="delivery" />
      Delivery (+Rs.100)
    </label>

    <textarea id="custAddress" placeholder="Address"></textarea>

    <h4>Payment</h4>

    <label>
      <input type="radio" name="payment" value="cash" />
      Cash
    </label>

    <label>
      <input type="radio" name="payment" value="jazzcash" />
      JazzCash
    </label>

    <label>
      <input type="radio" name="payment" value="easypaisa" />
      Easypaisa
    </label>

    <button onclick="placeOrder()">Place Order</button>
    <button onclick="closeCheckout()">Close</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© Wee'z Kitchen</p>
</footer>

<script src="script.js"></script>

<script>
function openCheckout() {
  document.getElementById("checkoutOverlay").style.display = "flex";
}

function closeCheckout() {
  document.getElementById("checkoutOverlay").style.display = "none";
}
</script>

</body>
</html>
